# ============================================
# 智能301跳转系统 - 完整 HTTPS 配置
# 域名: abc.a1cc.site, *.twziranfeng.xyz
# ============================================

# 1. HTTP 自动跳转 HTTPS (abc.a1cc.site)
server {
    listen 80;
    server_name abc.a1cc.site;
    
    access_log /var/log/nginx/abc_access.log;
    error_log /var/log/nginx/abc_error.log;
    
    return 301 https://abc.a1cc.site$request_uri;
}

# 2. HTTPS 入口域名配置 (abc.a1cc.site)
server {
    listen 443 ssl http2;
    server_name abc.a1cc.site;
    
    ssl_certificate /etc/letsencrypt/live/abc.a1cc.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/abc.a1cc.site/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    
    access_log /var/log/nginx/abc_ssl_access.log;
    error_log /var/log/nginx/abc_ssl_error.log;
    
    location / {
        return 301 http://check.twziranfeng.xyz:8080/?path=$request_uri;
    }
}

# 3. HTTP 自动跳转 HTTPS (check.twziranfeng.xyz)
server {
    listen 80;
    server_name check.twziranfeng.xyz;
    
    access_log /var/log/nginx/check_access.log;
    error_log /var/log/nginx/check_error.log;
    
    return 301 https://check.twziranfeng.xyz$request_uri;
}

# 4. HTTPS 健康检测服务 (check.twziranfeng.xyz)
server {
    listen 443 ssl http2;
    server_name check.twziranfeng.xyz;
    
    ssl_certificate /etc/letsencrypt/live/twziranfeng.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/twziranfeng.xyz/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    
    access_log /var/log/nginx/check_ssl_access.log;
    error_log /var/log/nginx/check_ssl_error.log;
    
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }
    
    location /health {
        proxy_pass http://127.0.0.1:8080/health;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# 5. HTTP 自动跳转 HTTPS (泛域名)
server {
    listen 80;
    server_name ~^(?<subdomain>.+)\.twziranfeng\.xyz$;
    
    access_log /var/log/nginx/twziranfeng_access.log;
    error_log /var/log/nginx/twziranfeng_error.log;
    
    return 301 https://$host$request_uri;
}

# 6. 泛域名 HTTPS - 托管 React 应用
server {
    listen 443 ssl http2;
    server_name ~^(?<subdomain>.+)\.twziranfeng\.xyz$;
    
    ssl_certificate /etc/letsencrypt/live/twziranfeng.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/twziranfeng.xyz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    
    access_log /var/log/nginx/react_access.log;
    error_log /var/log/nginx/react_error.log;
    
    root /www/wwwroot/trxhx/;
    index index.html;
    
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# 7. 备用域名 HTTP 跳转 HTTPS
server {
    listen 80;
    server_name backup.twziranfeng.xyz;
    
    access_log /var/log/nginx/backup_access.log;
    error_log /var/log/nginx/backup_error.log;
    
    return 301 https://backup.twziranfeng.xyz$request_uri;
}

# 8. 备用域名 HTTPS
server {
    listen 443 ssl http2;
    server_name backup.twziranfeng.xyz;
    
    ssl_certificate /etc/letsencrypt/live/twziranfeng.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/twziranfeng.xyz/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    
    location / {
        default_type text/html;
        charset utf-8;
        return 200 "<!DOCTYPE html><html><head><title>Backup</title></head><body><h1>备用服务器 (HTTPS)</h1><p>所有随机域名均不可用，请联系管理员。</p></body></html>";
    }
}
